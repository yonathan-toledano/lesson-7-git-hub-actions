name: Build and Push Docker Image
###################################################################
# 1. Create DockerHub token before running this!
# 2. Make sure to pass the right context in "Build and push" step!
###################################################################
on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./build-and-push
          file: ./build-and-push/Dockerfile
          # If secrets are missing, push is set to false so the workflow still compiles successfully as a test run!
          push: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME || 'local-test' }}/myimage-ex4:latest
            ${{ secrets.DOCKERHUB_USERNAME || 'local-test' }}/myimage-ex4:v0.${{ github.run_number }}
